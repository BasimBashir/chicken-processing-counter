services:
  chicken-counter:
    image: basim123/chicken-counter:latest
    build: .
    ports:
      - "5581:5581"
    volumes:
      - ./app/uploads:/app/app/uploads
      - ./app/outputs:/app/app/outputs
      # Persisted TensorRT engine cache — engines are built on first boot on the
      # target GPU and reused on subsequent boots. Keyed by GPU+TRT+precision+pt-hash.
      - engine_cache:/app/engine_cache
    environment:
      # Pass-through only — unset vars fall through to the Python defaults in
      # app/config.py, so container behavior matches local `uvicorn app.main:app`.
      # To override, export in your shell or set in .env before `docker compose up`.
      # MODEL_PATH is also promoted by docker-entrypoint.sh when TRT_AUTO_BUILD=1.
      - RTSP_URL
      - MODEL_PATH
      - ROI_POSITION
      - CONFIDENCE
      - CONF_EMPTY_SHACKLES
      - NMS_IOU
      - IMGSZ
      - MAX_DISTANCE
      - MAX_DISAPPEARED
      - RTSP_STREAMS
      - MAX_STREAMS
      - BATCH_MAX
      - BATCH_WINDOW_MS
      - INFERENCE_QUEUE_MAX
      - API_KEY
      # TensorRT auto-build is opt-in (set TRT_AUTO_BUILD=1 to enable).
      - TRT_AUTO_BUILD=${TRT_AUTO_BUILD:-0}
      - TRT_HALF=${TRT_HALF:-true}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5581/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # First boot on a new GPU builds the TRT engine (2-6 min on a 3090,
      # 10-15 min on smaller cards). Cached boots are fast — but the window
      # has to tolerate the cold case.
      start_period: 900s
    restart: unless-stopped

volumes:
  engine_cache:
