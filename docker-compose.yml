services:
  chicken-counter:
    image: basim123/chicken-counter:latest
    build: .
    ports:
      - "5581:5581"
    volumes:
      - ./app/uploads:/app/app/uploads
      - ./app/outputs:/app/app/outputs
    environment:
      - RTSP_URL=${RTSP_URL:-}
      - MODEL_PATH=best.pt
      - ROI_POSITION=${ROI_POSITION:-0.5}
      - CONFIDENCE=${CONFIDENCE:-0.25}
      - NMS_IOU=${NMS_IOU:-0.45}
      - IMGSZ=${IMGSZ:-640}
      - MAX_DISTANCE=${MAX_DISTANCE:-40}
      - MAX_DISAPPEARED=${MAX_DISAPPEARED:-50}
      # Multi-stream auto-start (JSON list of {id,url,...})
      - RTSP_STREAMS=${RTSP_STREAMS:-}
      - MAX_STREAMS=${MAX_STREAMS:-10}
      # Batched inference worker tuning
      - BATCH_MAX=${BATCH_MAX:-16}
      - BATCH_WINDOW_MS=${BATCH_WINDOW_MS:-25}
      - INFERENCE_QUEUE_MAX=${INFERENCE_QUEUE_MAX:-100}
      # API auth — set in production
      - API_KEY=${API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5581/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
